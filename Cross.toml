[target.aarch64-unknown-linux-gnu]
image = "ghcr.io/rust-cross/manylinux2014-cross:aarch64"

[target.x86_64-unknown-linux-gnu]
image = "ghcr.io/rust-cross/manylinux2014-cross:x86_64"

# CARGO_TARGET_*_LINKER: Rust linker (API-versioned NDK clang wrapper)
# CFLAGS / CXXFLAGS: Force --target with API level so cmake-rs (which
#   overrides the toolchain CACHE) still compiles C deps at the right API.
# Note: CROSS_ANDROID_SDK and CROSS_CMAKE_OBJECT_FLAGS are auto-forwarded
#   because they start with CROSS_.
[target.aarch64-linux-android]
env.passthrough = ["CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER", "CFLAGS", "CXXFLAGS"]

[target.armv7-linux-androideabi]
env.passthrough = ["CARGO_TARGET_ARMV7_LINUX_ANDROIDEABI_LINKER", "CFLAGS", "CXXFLAGS"]

[target.i686-linux-android]
env.passthrough = ["CARGO_TARGET_I686_LINUX_ANDROID_LINKER", "CFLAGS", "CXXFLAGS"]

[target.x86_64-linux-android]
env.passthrough = ["CARGO_TARGET_X86_64_LINUX_ANDROID_LINKER", "CFLAGS", "CXXFLAGS"]

[target.aarch64-apple-ios]
rustflags = ["-C", "link-arg=-lSystem"]

[target.aarch64-apple-ios-sim]
rustflags = ["-C", "link-arg=-lSystem"]

[target.x86_64-apple-ios]
rustflags = ["-C", "link-arg=-lSystem"]