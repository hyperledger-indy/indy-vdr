name: "Indy-VDR"

# Build versions (Rust, cross, Android linkers) are defined in
# versions.env at the repo root — the single source of truth.
# Each job loads them with:  grep -vE '^\s*(#|$)' versions.env >> "$GITHUB_ENV"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      publish-binaries:
        description: "Publish Binaries to Release (will create a release if no release exits for branch or tag)"
        required: true
        default: false
        type: boolean
      publish-python-wrapper:
        description: "Publish Python Wrapper to Registries"
        required: true
        default: false
        type: boolean
      publish-javascript-wrapper:
        description: "Publish JavaScript Wrapper to Registries"
        required: true
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: write

jobs:
  checks:
    name: Run checks
    strategy:
      matrix:
        os: [macos-14, windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Load build config
        shell: bash
        run: grep -vE '^\s*(#|$)' versions.env >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          components: clippy, rustfmt

      - name: Cache cargo resources
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: deps
          cache-on-failure: true

      - name: Cargo check
        run: cargo check --locked

      - name: Cargo check TLS support
        run: cargo check --locked --package indy-vdr-proxy --features tls

      - name: Cargo fmt
        run: cargo fmt --all -- --check

      - if: ${{ runner.os == 'Linux' }}
        name: Pre-install cross
        run: |
          cargo install --bins --git https://github.com/rust-embedded/cross --locked --tag v${{ env.CROSS_VERSION }} cross

  test-suite:
    name: Run Test Suite
    needs: [checks]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Load build config
        run: grep -vE '^\s*(#|$)' versions.env >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: Cache cargo resources
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: deps
          save-if: false

      - name: Debug build
        run: cargo build --locked --manifest-path libindy_vdr/Cargo.toml

      - name: Run local node pool
        run: |
          ./ci/test.sh up

      - name: Run tests
        run: cargo test --locked --manifest-path libindy_vdr/Cargo.toml --features local_nodes_pool

      - name: Stop local node pool
        run: |
          ./ci/test.sh down

  build-release:
    name: Build library
    needs: [checks]

    strategy:
      matrix:
        include:
          - architecture: linux-aarch64
            os: ubuntu-latest
            lib: libindy_vdr.so
            target: aarch64-unknown-linux-gnu
            use_cross: true
          - architecture: linux-x86_64
            os: ubuntu-latest
            lib: libindy_vdr.so
            target: x86_64-unknown-linux-gnu
            # using cross here to build against an older glibc for compatibility
            use_cross: true
          - architecture: darwin-universal
            os: macos-14
            lib: libindy_vdr.dylib
            target: darwin-universal
            # As of Rust 1.80, aarch64-apple-darwin is stable
            toolchain: stable
          - architecture: windows-x86_64
            os: windows-latest
            lib: indy_vdr.dll
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Load build config
        shell: bash
        run: grep -vE '^\s*(#|$)' versions.env >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain || env.RUST_VERSION }}

      - name: Cache cargo resources
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: deps
          save-if: false

      - if: ${{ matrix.use_cross }}
        name: Build (cross)
        run: |
          cargo install --bins --git https://github.com/rust-embedded/cross --locked --tag v${{ env.CROSS_VERSION }} cross
          cross build --locked --lib --release --target ${{ matrix.target }} -vv

      - if: ${{ !matrix.use_cross && matrix.architecture == 'darwin-universal' }}
        name: Build (mac)
        run: ./build-universal.sh

      # Requires using the default shell on Windows, otherwise it will complain:
      # "This perl implementation doesn't produce Windows like paths"
      - if: ${{ !matrix.use_cross && matrix.architecture != 'darwin-universal' }}
        name: Build (standard)
        run: |
          cargo build --locked --lib --release --target ${{ matrix.target }} -vv

      - name: Upload library artifacts
        uses: actions/upload-artifact@v7
        with:
          name: library-${{ matrix.architecture }}
          path: target/${{ matrix.target }}/release/${{ matrix.lib }}

      - name: Create library artifacts directory
        if: |
          github.event_name == 'release' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.publish-binaries == 'true')
        run: |
          mkdir release-artifacts
          cp target/${{ matrix.target }}/release/${{ matrix.lib }} release-artifacts/

      - uses: a7ul/tar-action@v1.2.0
        if: |
          github.event_name == 'release' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.publish-binaries == 'true')
        with:
          command: c
          cwd: release-artifacts
          files: .
          outPath: "library-${{ matrix.architecture }}.tar.gz"

      - name: Add library artifacts to release
        if: |
          github.event_name == 'release' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.publish-binaries == 'true')
        uses: svenstaro/upload-release-action@v2
        with:
          file: library-${{ matrix.architecture }}.tar.gz
          asset_name: "library-${{ matrix.architecture }}.tar.gz"

  build-golang:
    name: Build and Test Go wrapper
    needs: [build-release]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: "Use Golang 1.16.x+"
        uses: actions/setup-go@v6
        with:
          go-version: "^1.16.0"

      - name: Fetch library artifacts
        uses: actions/download-artifact@v8
        with:
          name: library-linux-x86_64

      - name: Build and test wrapper
        run: |
          sudo cp libindy_vdr.so /usr/lib/
          cd wrappers/golang
          go run cmd/demo/demo.go

  build-javascript:
    name: Build and Test JavaScript wrapper
    needs: [build-release]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    defaults:
      run:
        working-directory: wrappers/javascript

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.29.2

      - name: Set up Node.JS 20.x
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: pnpm
          cache-dependency-path: wrappers/javascript/pnpm-lock.yaml
          registry-url: "https://registry.npmjs.org/"

      - name: Fetch library artifacts
        uses: actions/download-artifact@v8
        with:
          name: library-linux-x86_64

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Check style
        run: pnpm style:check

      - name: Check types
        run: pnpm types:check

      - name: Run local node pool
        run: |
          cd ../../
          docker build --platform linux/amd64 -f ci/indy-pool.dockerfile -t test_pool --build-arg pool_ip=10.0.0.2 ci
          docker network create --subnet=10.0.0.0/8 indy-sdk-network 2>/dev/null || true
          docker run -d --platform linux/amd64 --name indy_pool -p 9701-9708:9701-9708 --net=indy-sdk-network test_pool
          # Wait for all 4 nodes to reach participating state (up to 60s)
          echo "Waiting for pool nodes to reach participating state..."
          for i in $(seq 1 60); do
            count=$(docker exec indy_pool bash -c "grep -l 'participating' /var/log/indy/sandbox/Node*.log 2>/dev/null | wc -l" 2>/dev/null || echo 0)
            echo "  attempt $i: $count/4 nodes participating"
            if [ "$count" -ge "4" ]; then
              echo "Pool ready."
              break
            fi
            sleep 1
          done
          cd wrappers/javascript
          docker exec $(docker ps -aqf "ancestor=test_pool") cat /var/lib/indy/sandbox/pool_transactions_genesis >> genesis.txn

      - name: Debug pool container
        run: |
          docker ps -a
          docker logs --tail 200 indy_pool || true
          docker inspect indy_pool --format '{{json .State}}' || true
          lsof -i TCP:9701-9708 -sTCP:LISTEN 2>/dev/null || ss -lntp 2>/dev/null | grep -E ':(970[1-8])' || true

      - name: Run tests
        env:
          # binary is downloaded to root of repository
          LIB_INDY_VDR_PATH: ../../../
        run: pnpm test

      - name: Publish JavaScript Wrapper
        if: |
          github.event_name == 'release' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.publish-javascript-wrapper == 'true')
        run: |
          # Determine dist-tag based on version (dev versions get alpha tag)
          DIST_TAG_FLAG=""
          if [[ $(grep version lerna.json | head -1 | grep dev) ]]; then
            DIST_TAG_FLAG="--tag alpha"
          fi
          # Publish packages in dependency order using pnpm publish, which
          # automatically replaces workspace:* references with resolved versions
          for pkg in indy-vdr-shared indy-vdr-nodejs indy-vdr-react-native; do
            (cd "$pkg" && pnpm publish --provenance --access public --no-git-checks $DIST_TAG_FLAG)
          done

  build-ios:
    name: Build library (iOS)
    needs: [checks]
    runs-on: macos-14
    strategy:
      matrix:
        target: [aarch64-apple-ios, aarch64-apple-ios-sim, x86_64-apple-ios]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Load build config
        run: grep -vE '^\s*(#|$)' versions.env >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Cache cargo resources
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: deps
          save-if: false

      - name: Build
        run: |
          # Set RUSTFLAGS to cap lints at warning level to prevent warnings from becoming errors
          export RUSTFLAGS="--cap-lints=warn"
          # Set iOS deployment target to align with RN 0.77+ requirement (iOS 15.1+)
          export IPHONEOS_DEPLOYMENT_TARGET=12.0
          export CMAKE_OSX_DEPLOYMENT_TARGET=12.0
          # For iOS simulator, use the simulator SDK
          if [[ "${{ matrix.target }}" == *"sim"* ]]; then
            export CMAKE_OSX_SYSROOT=$(xcrun --sdk iphonesimulator --show-sdk-path)
          else
            export CMAKE_OSX_SYSROOT=$(xcrun --sdk iphoneos --show-sdk-path)
          fi
          # Force ZMQ to use the correct compiler for iOS
          export CC=$(xcrun --find clang)
          export CXX=$(xcrun --find clang++)
          cargo build --locked --lib --release --target ${{ matrix.target }} --package indy-vdr

      - name: List files in target
        run: |
          ls -la target/${{ matrix.target }}/release/

      - name: Save library
        uses: actions/upload-artifact@v7
        with:
          name: library-${{ matrix.target}}
          path: target/${{ matrix.target }}/release/libindy_vdr.a

  create-ios-xcframework:
    name: Create iOS xcframework
    runs-on: macos-14
    needs: build-ios

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Fetch static libraries
        uses: actions/download-artifact@v8

      - name: Debug - List downloaded files
        run: find . -name "*.a" | sort

      - name: Debug - Show directory structure
        run: |
          ls -la
          ls -la library-aarch64-apple-ios
          ls -la library-aarch64-apple-ios-sim  
          ls -la library-x86_64-apple-ios

      - run: >
          ./build-xcframework.sh library-aarch64-apple-ios \
                                 library-aarch64-apple-ios-sim \
                                 library-x86_64-apple-ios

      - name: Save xcframework
        uses: actions/upload-artifact@v7
        with:
          name: indy_vdr.xcframework
          path: ./out

      - uses: geekyeggo/delete-artifact@v6
        with:
          name: |
            library-aarch64-apple-ios
            library-aarch64-apple-ios-sim
            library-x86_64-apple-ios
          failOnError: false

  build-android:
    name: Build library (Android)
    needs: [checks]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          [
            aarch64-linux-android,
            armv7-linux-androideabi,
            i686-linux-android,
            x86_64-linux-android,
          ]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Load build config
        run: grep -vE '^\s*(#|$)' versions.env >> "$GITHUB_ENV"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: Cache cargo resources
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: deps
          save-if: false

      - name: Build
        run: |
          # The cross Docker images bake in CROSS_CMAKE_OBJECT_FLAGS with
          # --target triples that lack an API level suffix. Without a suffix,
          # clang defines __ANDROID_API_FUTURE__ and exposes symbols like
          # pthread_cond_clockwait (API 30+) that crash on older devices.
          #
          # We fix this at two layers:
          #   1. CROSS_CMAKE_OBJECT_FLAGS — overrides the toolchain.cmake CACHE
          #      (helps non-cmake-rs cmake builds).
          #   2. CFLAGS / CXXFLAGS — the cc crate appends these to compiler
          #      flags, and cmake-rs forwards them via -DCMAKE_C_FLAGS which
          #      takes precedence over the toolchain CACHE.
          # In both cases the last --target= wins in clang.
          case "${{ matrix.target }}" in
            aarch64-linux-android)    clang_target="aarch64-linux-android${CROSS_ANDROID_SDK}" ;;
            armv7-linux-androideabi)  clang_target="armv7a-linux-androideabi${CROSS_ANDROID_SDK}" ;;
            i686-linux-android)       clang_target="i686-linux-android${CROSS_ANDROID_SDK}" ;;
            x86_64-linux-android)     clang_target="x86_64-linux-android${CROSS_ANDROID_SDK}" ;;
          esac
          export CROSS_CMAKE_OBJECT_FLAGS="--target=${clang_target} -DANDROID -ffunction-sections -fdata-sections -fPIC"
          export CFLAGS="--target=${clang_target}"
          export CXXFLAGS="--target=${clang_target}"

          cargo install --bins --git https://github.com/rust-embedded/cross --locked --tag v${{ env.CROSS_VERSION }} cross
          cross build --locked --lib --release --target ${{ matrix.target }} --package indy-vdr -vv

      - name: Validate NDK API level (21)
        shell: bash
        run: |
          lib_path="target/${{ matrix.target }}/release/libindy_vdr.so"
          sdk_note=$(readelf -n "$lib_path" | awk '/Android/ {in_note=1} in_note && /description data:/ {print; exit}')
          echo "$sdk_note" 
          if readelf -Ws "$lib_path" | grep -q "pthread_cond_clockwait"; then
            echo "Found pthread_cond_clockwait in $lib_path (requires API 30+)"
            readelf -Ws "$lib_path" | grep "pthread_cond_clockwait"
            exit 1
          fi

          if ! echo "$sdk_note" | grep -q "description data: 15 00 00 00"; then
            echo "Expected Android SDK version 21 in $lib_path (.note.android.ident)"
            readelf -n "$lib_path"
            exit 1
          fi

      - name: Save library
        uses: actions/upload-artifact@v7
        with:
          name: library-${{matrix.target}}
          path: target/${{ matrix.target }}/release/libindy_vdr.so

  create-android-library:
    name: Create library (Android)
    runs-on: ubuntu-latest
    needs: build-android
    steps:
      - name: Fetch libraries
        uses: actions/download-artifact@v8

      - run: |
          sudo mkdir ./libs
          sudo mv library-aarch64-linux-android   ./libs/arm64-v8a
          sudo mv library-armv7-linux-androideabi ./libs/armeabi-v7a
          sudo mv library-i686-linux-android      ./libs/x86
          sudo mv library-x86_64-linux-android    ./libs/x86_64

      - name: Save Android library
        uses: actions/upload-artifact@v7
        with:
          name: android-libraries
          path: ./libs

      - uses: geekyeggo/delete-artifact@v6
        with:
          name: |
            library-aarch64-linux-android
            library-armv7-linux-androideabi
            library-i686-linux-android
            library-x86_64-linux-android
          failOnError: false

  create-ios-android-release-asset:
    name: Create iOS and Android release assets
    runs-on: ubuntu-latest
    needs:
      - create-ios-xcframework
      - create-android-library
    if: |
      (github.event_name == 'release' ||
      (github.event_name == 'workflow_dispatch' &&
       github.event.inputs.publish-binaries == 'true'))

    steps:
      - name: Fetch Android libraries
        uses: actions/download-artifact@v8
        with:
          name: android-libraries
          path: mobile/android/

      - name: Fetch iOS Framework
        uses: actions/download-artifact@v8
        with:
          name: indy_vdr.xcframework
          path: mobile/ios/

      - uses: a7ul/tar-action@v1.2.0
        with:
          command: c
          files: ./mobile
          outPath: "library-ios-android.tar.gz"

      - name: Add library artifacts to release
        uses: svenstaro/upload-release-action@v2
        with:
          file: library-ios-android.tar.gz
          asset_name: "library-ios-android.tar.gz"

  build-py:
    name: Build and test Python wrapper
    needs: [build-release]

    strategy:
      matrix:
        architecture:
          [linux-aarch64, linux-x86_64, darwin-universal, windows-x86_64]
        python-version: ["3.8"]
        include:
          - os: ubuntu-latest
            architecture: linux-aarch64
            plat-name: manylinux2014_aarch64
          - os: ubuntu-latest
            architecture: linux-x86_64
            plat-name: manylinux2014_x86_64
          - os: macos-14
            architecture: darwin-universal
            plat-name: macosx_14_0_universal2
          - os: windows-latest
            architecture: windows-x86_64
            plat-name: win_amd64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel twine auditwheel

      - name: Fetch library artifacts
        uses: actions/download-artifact@v8
        with:
          name: library-${{ matrix.architecture }}
          path: wrappers/python/indy_vdr/

      - name: Build python package
        shell: sh
        run: |
          python setup.py bdist_wheel --python-tag=py3 --plat-name=${{ matrix.plat-name }}
        working-directory: wrappers/python

      - name: Test python package
        if: ${{ matrix.architecture != 'linux-aarch64' }}
        shell: sh
        run: |
          pip install dist/*
          python -m demo.test
        working-directory: wrappers/python

      - if: ${{ runner.os == 'Linux' }}
        name: Audit wheel
        run: |
          auditwheel show wrappers/python/dist/* | tee auditwheel.log
          grep -q manylinux_2_17_ auditwheel.log

      - name: Upload python package
        uses: actions/upload-artifact@v7
        with:
          name: python-${{ matrix.architecture }}
          path: wrappers/python/dist/*

      - if: |
          github.event_name == 'release' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.publish-python-wrapper == 'true')
        name: Publish python package
        env:
          TWINE_USERNAME: ${{ secrets.PYPI_USERNAME }}
          TWINE_PASSWORD: ${{ secrets.PYPI_PASSWORD }}
        run: |
          twine upload --skip-existing dist/*
        working-directory: wrappers/python
